<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vier gewinnt</title>

  <style>

    div {
      box-sizing: border-box;
    }

    .board {
      width: 70vw;
      margin: auto;
      outline: 1px solid black;
      pointer-events: auto;
   }

    .board .field {
      border: 1px solid black;
      width: 10vw;
      height: 10vw;
      /*display: none;*/
      float:right;
    }

    .board .field:first-child {
      display: block;
    }

    .board .field .piece {
      width: 8vw;
      height: 8vw;
      border-radius: 50%;
      margin: 1vw;
    }
    .board .field .blue {
      background-color: blue;
    }
    .board .field .red {
      background-color: red;
    }

  </style>

   <script src="code.js"></script> 
   <script src="connect4-winner.js"></script> 
</head>
<body>

  <!--
  Blaue Kreis: Class "blue piece"
  -> Farb kommt von Klasse blue, piece wird rund wegen border-radius 50%
  -> Anpassung dank viewports units (vw), es passt sich automatisch an (keine fixe grösse wie pixel oder mm)
  -->




  <div class="board">  </div>
  <button onclick="resetBoard()">Reset board</button>
  <p class="whowon"></p>
  <p class="whosturn"></p>
  <script>
    showBoard()
  </script> 


</body>
</html>
